<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NLP Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#0a1408] via-[#1b3921] to-[#4f6b33] min-h-screen flex items-center justify-center p-4">

  <div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-2xl">
    <h1 class="text-3xl font-bold text-center text-[#1b3921] mb-6">🌿 NLP Assistant</h1>

    <textarea id="inputText" rows="5" placeholder="Enter your text here..."
      class="w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#a5c15d] focus:border-transparent mb-4 transition"></textarea>

    <input id="instructionInput" type="text"
      placeholder='What should I do? e.g. "summarize and tell me the tone"'
      class="w-full p-4 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#a5c15d] focus:border-transparent mb-4 transition" />

    <button onclick="processText()"
      class="w-full bg-[#4f6b33] text-white py-3 rounded-xl font-semibold hover:bg-[#1b3921] hover:shadow-lg transition-all mb-6">
      Run
    </button>

    <div id="planBox" class="hidden mb-4 bg-gray-50 border border-gray-200 rounded-xl p-4">
      <p class="text-xs text-gray-400 font-semibold uppercase mb-1">Agent plan</p>
      <p id="planText" class="text-sm text-gray-600 font-mono"></p>
    </div>

    <div>
      <h2 class="text-xl font-semibold text-[#1b3921] mb-2">Result:</h2>
      <div id="output" class="bg-[#ecf5b7] text-[#0a1408] p-4 rounded-xl min-h-[80px] whitespace-pre-wrap shadow-inner"></div>
    </div>
  </div>

<script>
async function processText() {
  const inputText = document.getElementById('inputText').value;
  const instruction = document.getElementById('instructionInput').value;
  const output = document.getElementById('output');
  const planBox = document.getElementById('planBox');
  const planText = document.getElementById('planText');

  if (!inputText.trim()) {
    output.innerText = "Please enter some text first!";
    return;
  }
  if (!instruction.trim()) {
    output.innerText = "Please enter an instruction!";
    return;
  }

  output.innerText = "Loading...";
  planBox.classList.add('hidden');

  try {
    const response = await fetch('/process', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: inputText, instruction: instruction })
    });

    const data = await response.json();
    const result = data.result;
    let formatted = "";

    if (result.tasks_executed && result.tasks_executed.length > 0) {
      planText.innerText = result.tasks_executed.join(' → ');
      planBox.classList.remove('hidden');
    }

    if (result.summary) {
      formatted += "Summary:\n" + result.summary + "\n\n";
    }

    if (result.rewritten) {
      formatted += "Rewritten:\n" + result.rewritten + "\n\n";
    }

    if (result.sentiment) {
      const label = result.sentiment.label;
      const confidence = result.sentiment.confidence;
      let certaintyText = "";

      if (confidence < 0.5) {
        certaintyText = "I'm really not sure but maybe";
      } else if (confidence <= 0.7) {
        certaintyText = "probably";
      } else {
        certaintyText = "definitely";
      }

      formatted += `Tone: ${certaintyText} ${label}\n\n`;
    }

    output.innerText = formatted.trim() || "No result";

  } catch (error) {
    output.innerText = "Error: " + error;
  }
}
</script>

</body>
</html>
